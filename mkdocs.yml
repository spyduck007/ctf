site_name: Ansh Agrawal
site_url: https://anshagrawal.xyz/
site_author: Ansh Agrawal
site_description: Personal cybersecurity and CTF portfolio of Ansh Agrawal, also known online as spyduck007, a TJHSST student.

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - header.autohide

nav:
  - Home: index.md
  - About: about.md
  - Writeups: write-ups/index.md
  - CTF Results: ctf-history.md
  - Projects: projects.md
  - Teaching: mentoring.md
  - Contact: "#"

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/writeup_filters.js
  - javascripts/contact_modal.js
  - javascripts/animations.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spyduck007
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ansh-agrawal-3b7a14356/
